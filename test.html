<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>Thi thử IELTS Speaking — Gotcha · UNICOACH</title>
<meta name="description" content="Thi thử IELTS Speaking đầy đủ 3 phần ngay trên trình duyệt: đồng hồ đếm ngược, phản hồi song ngữ tức thì. Miễn phí.">
<meta name="theme-color" content="#11183A">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap">
<style>
@font-face{font-family:'Trajan Pro';src:url('assets/TrajanPro3Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap;}
@font-face{font-family:'Trajan Pro';src:url('assets/TrajanPro3SemiBold.woff2') format('woff2');font-weight:600;font-style:normal;font-display:swap;}
@font-face{font-family:'Trajan Pro';src:url('assets/TrajanPro3Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap;}
@font-face{font-family:'Trajan Pro';src:url('assets/TrajanPro3Black.woff2') format('woff2');font-weight:900;font-style:normal;font-display:swap;}
:root{
  --sapphire:#11183A;--sapphire-deep:#0A0E24;--oxblood:#5A1726;--oxblood-deep:#3A0E18;
  --emerald:#123F33;--gold:#C8A14B;--gold-light:#E7CE8E;--gold-dark:#8A6A28;
  --parchment:#F4ECD8;--parchment2:#E9DCBE;--ivory:#FBF7EE;--ink:#241B10;
  --foil:linear-gradient(135deg,#8A6A28,#E7CE8E 26%,#C8A14B 48%,#F4E7BC 66%,#A9863A 86%,#8A6A28);
  --fd:'Trajan Pro','Cormorant Garamond',serif;--fh:'Trajan Pro','Cormorant Garamond',serif;--fs:'Cormorant Garamond',serif;--fb:'EB Garamond',serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--fb);background:var(--ivory);color:var(--ink);line-height:1.5}
header{background:var(--sapphire);border-bottom:2px solid var(--gold-dark);padding:12px 18px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.crest{height:40px}
.wm{font-family:var(--fd);font-weight:900;font-size:1.4rem;background:var(--foil);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.06em}
.motto{font-family:var(--fs);font-style:italic;color:var(--gold-light);font-size:.8rem;opacity:.85}
.spacer{flex:1}
#langBtn{font-family:var(--fh);font-weight:600;font-size:.72rem;letter-spacing:.05em;background:var(--sapphire-deep);color:var(--gold-light);border:1px solid var(--gold-dark);border-radius:6px;padding:6px 10px;cursor:pointer}
header a{font-family:var(--fh);font-weight:600;font-size:.72rem;color:var(--gold-light);margin-right:12px;text-decoration:none}
main{max-width:680px;margin:0 auto;padding:20px 16px 60px}
.card{background:var(--ivory);border:1px solid var(--gold);border-radius:14px;padding:20px 18px;box-shadow:0 8px 30px rgba(17,24,58,.06)}
.lbl{font-family:var(--fh);font-weight:600;font-size:.7rem;letter-spacing:.14em;color:var(--oxblood)}
h2{font-family:var(--fh);font-weight:900;font-size:1.5rem;color:var(--sapphire);margin:6px 0 4px;letter-spacing:.02em}
.sub{color:var(--ink);font-size:1rem;margin:6px 0 14px}
.vi2,.en2{display:block;font-family:var(--fs);font-style:italic;color:var(--gold-dark);font-size:.9rem;margin-top:3px}
body.no-vi .vi2,body.no-vi .vi{display:none}
.plan{list-style:none;margin:8px 0 12px}
.plan li{background:var(--parchment);border-left:4px solid var(--gold);border-radius:0 8px 8px 0;padding:9px 12px;margin-bottom:7px;font-size:.96rem}
.plan li b{font-family:var(--fh);font-weight:700;color:var(--sapphire)}
.warn{background:#fff6e6;border:1px solid var(--gold-dark);border-radius:10px;padding:11px 13px;font-size:.9rem;color:var(--gold-dark);margin:6px 0 16px}
.btn-primary{display:block;width:100%;font-family:var(--fh);font-weight:700;font-size:.95rem;letter-spacing:.05em;background:var(--foil);color:var(--sapphire);border:1px solid var(--gold-dark);border-radius:10px;padding:15px;cursor:pointer;margin-top:8px}
.btn-primary:hover{filter:brightness(1.06)}
.btn-ghost{display:inline-block;font-family:var(--fh);font-weight:600;font-size:.8rem;letter-spacing:.04em;background:transparent;border:1px solid var(--oxblood);color:var(--oxblood);border-radius:9px;padding:11px 16px;cursor:pointer;margin-top:10px;text-decoration:none;text-align:center}
.btn-next{display:block;width:100%;font-family:var(--fh);font-weight:700;font-size:.9rem;letter-spacing:.04em;background:var(--sapphire);color:var(--gold-light);border:none;border-radius:10px;padding:14px;cursor:pointer;margin-top:14px}
.btn-next:disabled{opacity:.5}
/* progress dots */
.dots{display:flex;gap:5px;justify-content:center;margin-bottom:14px;flex-wrap:wrap}
.dot{width:14px;height:6px;border-radius:3px;background:var(--parchment2);border:1px solid var(--gold-dark)}
.dot.p2{width:22px}
.dot.done{background:var(--emerald);border-color:var(--emerald)}
.dot.now{background:var(--gold);border-color:var(--gold-dark);box-shadow:0 0 0 2px rgba(200,161,75,.3)}
.steplabel{font-family:var(--fh);font-weight:700;font-size:1.05rem;color:var(--oxblood);text-align:center;margin-bottom:12px}
.steplabel .en2{font-weight:400;margin-top:1px}
.cueBox,.qBox{background:var(--parchment);border:1px dashed var(--gold-dark);border-radius:12px;padding:14px 16px;margin-bottom:12px}
.qBox.part2{border-style:solid}
.cueText,.qText{font-size:1.15rem;margin-top:6px;line-height:1.5}
#notes,textarea{width:100%;font-family:var(--fb);font-size:1rem;border:1px solid var(--gold-dark);border-radius:10px;padding:10px;margin:8px 0;background:#fff;resize:vertical}
.prepNote{font-size:.95rem;color:var(--gold-dark);margin-top:4px}
.ring{text-align:center;margin:14px 0 6px}
.ring span{font-family:var(--fh);font-weight:700;font-size:2.4rem;color:var(--sapphire);letter-spacing:.04em}
.ring.live span{color:var(--oxblood)}
.ring span.urgent{color:#b3122b;animation:blink .5s steps(2,start) infinite}
@keyframes blink{to{opacity:.35}}
.track{height:8px;background:var(--parchment2);border-radius:4px;overflow:hidden;margin:6px auto;max-width:320px}
.bar{height:100%;width:0;background:var(--foil);transition:width 1s linear}
.recWrap{display:flex;flex-direction:column;align-items:center;gap:6px;margin-top:10px}
.recBtn{font-family:var(--fh);font-weight:700;font-size:.82rem;letter-spacing:.06em;border:2px solid var(--gold);background:var(--oxblood);color:var(--gold-light);border-radius:30px;padding:10px 22px;cursor:pointer}
.recBtn[data-state=recording]{animation:pulse 1.3s infinite}
@keyframes pulse{0%{box-shadow:0 0 0 0 rgba(90,23,38,.5)}70%{box-shadow:0 0 0 16px rgba(90,23,38,0)}100%{box-shadow:0 0 0 0 rgba(90,23,38,0)}}
.liveTx{min-height:1.4em;font-family:var(--fs);font-style:italic;color:var(--gold-dark);font-size:1rem;margin-top:10px;text-align:center}
.tiny{font-size:.8rem;color:var(--gold-dark);text-align:center;margin-top:8px}
.dim{color:var(--gold-dark);opacity:.85}
/* report */
.metrics{display:flex;gap:10px;margin:12px 0 14px}
.metrics .m{flex:1;text-align:center;background:var(--parchment);border:1px solid var(--gold-dark);border-radius:10px;padding:12px 4px}
.metrics .m b{font-family:var(--fh);font-weight:700;font-size:1.6rem;color:var(--sapphire);display:block}
.metrics .m span{font-size:.72rem;color:var(--gold-dark)}
table.parts{width:100%;border-collapse:collapse;font-size:.92rem;margin:6px 0 8px}
table.parts th{font-family:var(--fh);font-weight:600;text-align:left;background:var(--sapphire);color:var(--gold-light);padding:6px 8px;font-size:.72rem;letter-spacing:.04em}
table.parts td{padding:6px 8px;border-bottom:1px solid var(--parchment2)}
h3{font-family:var(--fh);font-weight:600;font-size:1rem;color:var(--oxblood);margin:18px 0 8px;letter-spacing:.03em}
h3 .dim{font-family:var(--fb);font-size:.75rem;font-weight:400}
.fb{list-style:none}
.fb li{background:var(--ivory);border-left:4px solid var(--gold);border-radius:0 8px 8px 0;padding:10px 12px;margin-bottom:9px}
.fb li.on_target{border-left-color:var(--emerald)}
.fb li.improving{border-left-color:var(--gold)}
.fb li.focus{border-left-color:var(--oxblood)}
.fb .i{font-size:.8rem;margin-right:6px}
.fb .en{display:inline}
.fb .vi{font-family:var(--fs);font-style:italic;color:var(--gold-dark);font-size:.92rem;margin-top:2px}
.tag{font-family:var(--fh);font-weight:600;font-size:.6rem;letter-spacing:.05em;background:var(--sapphire);color:var(--gold-light);padding:2px 7px;border-radius:4px;margin-right:6px}
.bandNote{background:#eef4f1;border:1px solid var(--emerald);border-radius:10px;padding:12px 14px;font-size:.9rem;color:var(--emerald);margin:16px 0}
.actions{display:flex;flex-direction:column;gap:0;margin-top:8px}
.err{background:#fdefe0;border:1px solid var(--oxblood);border-radius:10px;padding:14px;color:var(--oxblood)}
footer{text-align:center;font-family:var(--fs);font-style:italic;color:var(--gold-dark);font-size:.85rem;padding:20px}
</style>
</head>
<body>
<header>
  <img class="crest" src="assets/crest.svg" alt="UNICOACH" onerror="this.style.display='none'">
  <div>
    <div class="wm">GOTCHA</div>
    <div class="motto">Per te, ad astra — by UNICOACH</div>
  </div>
  <div class="spacer"></div>
  <a href="/">← Trang chủ</a><button id="langBtn">VI ✓</button>
</header>
<main>
  <div id="app"></div>
</main>
<footer>“Per te, ad astra” — bắt đầu từ bạn, cùng nhau vươn tới đỉnh cao · © 2026 UNICOACH</footer>
<script src="mocktest.js"></script>
<script>window.va=window.va||function(){(window.vaq=window.vaq||[]).push(arguments);};</script>
<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
